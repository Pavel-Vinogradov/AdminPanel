name: Laravel CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:alpine
        env:
          POSTGRES_DB: maxima.admin
          POSTGRES_USER: maxima.admin
          POSTGRES_PASSWORD: maxima.admin
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U maxima.admin"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mongodb:
        image: mongo:latest
        env:
          MONGO_INITDB_ROOT_USERNAME: root
          MONGO_INITDB_ROOT_PASSWORD: example
        ports:
          - 27017:27017

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Compose
        run: docker compose up -d

      - name: Install MongoDB extension
        run: |
          sudo apt-get update && sudo apt-get install -y php-mongodb
          sudo service php8.3-fpm restart

      - name: Install PHP dependencies
        run: |
          composer install --no-progress --no-suggest --prefer-dist --ignore-platform-req=ext-mongodb
          cp .env.example .env
          php artisan key:generate

      - name: Run PHP Linter
        run: find . -name "*.php" -not -path "./vendor/*" -exec php -l {} \;

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=512M

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run tests
        run: php artisan test
